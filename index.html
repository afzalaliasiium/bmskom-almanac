<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMSKOM ALMANAC</title>
    
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; display: flex; gap: 20px; }
        .form-container { width: 300px; padding: 20px; background: #f9f9f9; border-radius: 8px; border: 1px solid #ddd; height: fit-content;}
        .calendar-container { flex-grow: 1; }
        input, select, button { width: 100%; margin-bottom: 15px; padding: 10px; box-sizing: border-box; }
        button { background: #0366d6; color: white; border: none; cursor: pointer; border-radius: 4px; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

    <div class="form-container">
        <h3>Add Activity</h3>
        <form id="activityForm">
            <label>Activity Name</label>
            <input type="text" id="name" required>
            
            <label>Date and Time</label>
            <input type="datetime-local" id="datetime" required>
            
            <label>Location</label>
            <input type="text" id="location" required>
            
            <label>Team</label>
            <input type="text" id="team" required>
            
            <button type="submit" id="submitBtn">Save Activity</button>
        </form>
        <p id="statusMsg"></p>
    </div>

    <div class="calendar-container">
        <div id="calendar"></div>
    </div>

    <script>
        // REPLACE THIS WITH YOUR DEPLOYED GOOGLE SCRIPT URL
        const API_URL = 'https://script.google.com/macros/s/AKfycby2bY-FGnyScUxHjDWeZ9gYACHFU7uuuwG8nYM_DABfxWKJK6FWbDgzaEAO7qn9Qp55Lw/exec'; 

        document.addEventListener('DOMContentLoaded', function() {
            const calendarEl = document.getElementById('calendar');
            
            // Initialize Calendar
            const calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,timeGridWeek,timeGridDay'
                },
                events: API_URL, // FullCalendar automatically sends a GET request here
                eventClick: function(info) {
                    alert('Location: ' + info.event.extendedProps.location + '\nTeam: ' + info.event.extendedProps.team);
                }
            });
            calendar.render();

            // Handle Form Submission
            document.getElementById('activityForm').addEventListener('submit', function(e) {
                e.preventDefault();
                const btn = document.getElementById('submitBtn');
                const statusMsg = document.getElementById('statusMsg');
                
                btn.innerText = 'Saving...';
                btn.disabled = true;

                const payload = {
                    name: document.getElementById('name').value,
                    datetime: document.getElementById('datetime').value,
                    location: document.getElementById('location').value,
                    team: document.getElementById('team').value
                };

                // Send POST request to Apps Script
                fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload),
                    // mode: 'no-cors' is often needed to bypass strict preflight blocks in GAS
                    mode: 'no-cors', 
                    headers: { 'Content-Type': 'application/json' }
                }).then(() => {
                    statusMsg.innerText = "Activity Saved!";
                    statusMsg.style.color = "green";
                    document.getElementById('activityForm').reset();
                    btn.innerText = 'Save Activity';
                    btn.disabled = false;
                    
                    // Refresh calendar to show new event
                    calendar.refetchEvents(); 
                    
                    setTimeout(() => statusMsg.innerText = "", 3000);
                }).catch(error => {
                    console.error('Error:', error);
                    statusMsg.innerText = "Error saving activity.";
                    statusMsg.style.color = "red";
                    btn.innerText = 'Save Activity';
                    btn.disabled = false;
                });
            });
        });
    </script>
</body>
</html>
