<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMS-KOM ALMANAC</title>
    
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; display: flex; flex-direction: column; gap: 40px; }
        
        /* Top Section: Form and Calendar */
        .top-section { display: flex; gap: 20px; }
        .form-container { width: 300px; padding: 20px; background: #f9f9f9; border-radius: 8px; border: 1px solid #ddd; height: fit-content;}
        .calendar-container { flex-grow: 1; }
        
        /* Form Inputs */
        input, select, button { width: 100%; margin-bottom: 15px; padding: 10px; box-sizing: border-box; }
        button { background: #0366d6; color: white; border: none; cursor: pointer; border-radius: 4px; font-weight: bold;}
        button:hover { background: #0056b3; }
        
        /* Upcoming Events Section */
        .upcoming-container { padding: 20px; background: #ffffff; border-radius: 8px; border: 1px solid #ddd; }
        .upcoming-container h3 { margin-top: 0; border-bottom: 2px solid #0366d6; padding-bottom: 10px; display: inline-block; }
        
        .event-list { list-style-type: none; padding: 0; margin: 0; display: grid; gap: 15px; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }
        .event-card { padding: 15px; background: #f4f7f8; border-left: 5px solid #0366d6; border-radius: 4px; }
        .event-card strong { font-size: 1.1em; display: block; margin-bottom: 5px; color: #333; }
        .event-details { font-size: 0.9em; color: #555; line-height: 1.5; }
    </style>
</head>
<body>

    <div class="top-section">
        <div class="form-container">
            <h3>Add Activity</h3>
            <form id="activityForm">
                <label>Activity Name</label>
                <input type="text" id="name" required>
                
                <label>Start Date and Time</label>
                <input type="datetime-local" id="startDatetime" required>

                <label>End Date and Time</label>
                <input type="datetime-local" id="endDatetime" required>
                
                <label>Location</label>
                <input type="text" id="location" required>
                
                <label>Team</label>
                <input type="text" id="team" required>
                
                <button type="submit" id="submitBtn">Save Activity</button>
            </form>
            <p id="statusMsg"></p>
        </div>

        <div class="calendar-container">
            <div id="calendar"></div>
        </div>
    </div>

    <div class="upcoming-container">
        <h3>Upcoming Activities</h3>
        <ul id="eventList" class="event-list">
            <li>Loading upcoming events...</li>
        </ul>
    </div>

    <script>
        // REPLACE THIS WITH YOUR DEPLOYED GOOGLE SCRIPT URL
        const API_URL = 'https://script.google.com/macros/s/AKfycby2bY-FGnyScUxHjDWeZ9gYACHFU7uuuwG8nYM_DABfxWKJK6FWbDgzaEAO7qn9Qp55Lw/exec'; 

        // Function to render the list at the bottom
        function renderUpcomingEvents(eventsData) {
            const listEl = document.getElementById('eventList');
            listEl.innerHTML = ''; // Clear the loading text

            const now = new Date();
            
            // Filter out past events and sort the remaining ones chronologically
            const upcoming = eventsData
                .filter(event => new Date(event.start) >= now)
                .sort((a, b) => new Date(a.start) - new Date(b.start));

            if (upcoming.length === 0) {
                listEl.innerHTML = '<li>No upcoming events scheduled at this time.</li>';
                return;
            }

            // Create a card for each upcoming event
            upcoming.forEach(event => {
                const li = document.createElement('li');
                li.className = 'event-card';
                
                // Format the date nicely
                const startDateObj = new Date(event.start);
                const dateOptions = { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' };
                const formattedDate = startDateObj.toLocaleDateString(undefined, dateOptions);

                li.innerHTML = `
                    <strong>${event.title}</strong>
                    <div class="event-details">
                        🕒 ${formattedDate}<br>
                        📍 ${event.extendedProps.location}
                    </div>
                `;
                listEl.appendChild(li);
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            const calendarEl = document.getElementById('calendar');
            
            // Initialize Calendar
            const calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,timeGridWeek,timeGridDay'
                },
                
                // Custom fetch logic
                events: function(info, successCallback, failureCallback) {
                    fetch(API_URL + '?t=' + new Date().getTime())
                        .then(response => response.json())
                        .then(data => {
                            // 1. Give the data to the Calendar
                            successCallback(data);
                            
                            // 2. Give the exact same data to our new List View
                            renderUpcomingEvents(data);
                        })
                        .catch(error => {
                            console.error('Calendar Fetch Error:', error);
                            failureCallback(error);
                            document.getElementById('eventList').innerHTML = '<li style="color:red;">Error loading events.</li>';
                        });
                },
                
                eventClick: function(info) {
                    alert('Location: ' + info.event.extendedProps.location + '\nTeam: ' + info.event.extendedProps.team);
                }
            });
            calendar.render();

            // Handle Form Submission
            document.getElementById('activityForm').addEventListener('submit', function(e) {
                e.preventDefault();
                const btn = document.getElementById('submitBtn');
                const statusMsg = document.getElementById('statusMsg');
                
                btn.innerText = 'Saving...';
                btn.disabled = true;

                const payload = {
                    name: document.getElementById('name').value,
                    startDatetime: document.getElementById('startDatetime').value,
                    endDatetime: document.getElementById('endDatetime').value,
                    location: document.getElementById('location').value,
                    team: document.getElementById('team').value
                };

                // Send POST request to Apps Script
                fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload),
                    mode: 'no-cors', 
                    headers: { 'Content-Type': 'application/json' }
                }).then(() => {
                    statusMsg.innerText = "Activity Saved!";
                    statusMsg.style.color = "green";
                    document.getElementById('activityForm').reset();
                    btn.innerText = 'Save Activity';
                    btn.disabled = false;
                    
                    // Refetch events. This automatically updates BOTH the calendar and the upcoming list!
                    calendar.refetchEvents(); 
                    
                    setTimeout(() => statusMsg.innerText = "", 3000);
                }).catch(error => {
                    console.error('Error:', error);
                    statusMsg.innerText = "Error saving activity.";
                    statusMsg.style.color = "red";
                    btn.innerText = 'Save Activity';
                    btn.disabled = false;
                });
            });
        });
    </script>
</body>
</html>
